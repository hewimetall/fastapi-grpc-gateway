name: Release

# Тег v0.2.0 → GitHub Release (whl + fgg-worker) + PyPI
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build only (skip PyPI / GitHub Release publish)"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build-python:
    name: Build Python wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Build
        run: uv build --out-dir dist

      - name: Check
        run: uvx twine check dist/*

      - name: Verify tag version matches package (on tags)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "tag=$TAG package=$PKG"
          test "$TAG" = "$PKG"

      - uses: actions/upload-artifact@v4
        with:
          name: release-wheels
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error

  build-worker:
    name: Build fgg-worker binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: |
          curl -sL -o /tmp/protoc.zip \
            https://github.com/protocolbuffers/protobuf/releases/download/v28.3/protoc-28.3-linux-x86_64.zip
          sudo unzip -o /tmp/protoc.zip -d /usr/local
          protoc --version

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build -p fgg-worker --release

      - name: Stage binary
        run: |
          mkdir -p dist
          cp target/release/fgg-worker dist/fgg-worker-x86_64-unknown-linux-gnu
          chmod +x dist/fgg-worker-x86_64-unknown-linux-gnu

      - uses: actions/upload-artifact@v4
        with:
          name: release-worker
          path: dist/fgg-worker-x86_64-unknown-linux-gnu
          if-no-files-found: error

  github-release:
    name: GitHub Release
    needs: [build-python, build-worker]
    if: startsWith(github.ref, 'refs/tags/v') && (github.event_name != 'workflow_dispatch' || inputs.dry_run == false)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-wheels
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: release-worker
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/fgg-worker-x86_64-unknown-linux-gnu
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            ## Install

            ```bash
            uv add 'fastapi-grpc-gateway @ https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/fastapi_grpc_gateway-0.2.0-py3-none-any.whl'
            curl -sL -o fgg-worker \
              https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/fgg-worker-x86_64-unknown-linux-gnu
            chmod +x fgg-worker
            export FGG_WORKER=$PWD/fgg-worker
            uv run fgg serve --app app:app --out ./gen
            ```

            gRPC is Rust-only — no Python `grpcio`.

  pypi-publish:
    name: Publish to PyPI
    needs: build-python
    if: startsWith(github.ref, 'refs/tags/v') && (github.event_name != 'workflow_dispatch' || inputs.dry_run == false)
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/fastapi-grpc-gateway
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-wheels
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
        continue-on-error: true
