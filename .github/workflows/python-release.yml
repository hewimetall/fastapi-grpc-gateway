name: Release Python package

# Публикация по тегу: v0.1.0 → GitHub Release + PyPI
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build only (skip PyPI / GitHub Release publish)"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build:
    name: Build wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build
        run: python -m build --outdir dist

      - name: Check
        run: twine check dist/*

      - name: Verify tag version matches package (on tags)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "tag=$TAG package=$PKG"
          test "$TAG" = "$PKG"

      - uses: actions/upload-artifact@v4
        with:
          name: release-wheels
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error

  github-release:
    name: GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') && (github.event_name != 'workflow_dispatch' || inputs.dry_run == false)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-wheels
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true

  pypi-publish:
    name: Publish to PyPI
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') && (github.event_name != 'workflow_dispatch' || inputs.dry_run == false)
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/fastapi-grpc-gateway
    permissions:
      id-token: write  # Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-wheels
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
