name: Release

# Тег v0.1.0 → GitHub Release (whl + fgg-worker) + PyPI
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build only (skip PyPI / GitHub Release publish)"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build-python:
    name: Build Python wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build
        run: python -m build --outdir dist

      - name: Check
        run: twine check dist/*

      - name: Verify tag version matches package (on tags)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "tag=$TAG package=$PKG"
          test "$TAG" = "$PKG"

      - uses: actions/upload-artifact@v4
        with:
          name: release-wheels
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error

  build-worker:
    name: Build fgg-worker binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: |
          curl -sL -o /tmp/protoc.zip \
            https://github.com/protocolbuffers/protobuf/releases/download/v28.3/protoc-28.3-linux-x86_64.zip
          sudo unzip -o /tmp/protoc.zip -d /usr/local
          protoc --version

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build -p fgg-worker --release

      - name: Stage binary
        run: |
          mkdir -p dist
          cp target/release/fgg-worker dist/fgg-worker-x86_64-unknown-linux-gnu
          chmod +x dist/fgg-worker-x86_64-unknown-linux-gnu

      - uses: actions/upload-artifact@v4
        with:
          name: release-worker
          path: dist/fgg-worker-x86_64-unknown-linux-gnu
          if-no-files-found: error

  github-release:
    name: GitHub Release
    needs: [build-python, build-worker]
    if: startsWith(github.ref, 'refs/tags/v') && (github.event_name != 'workflow_dispatch' || inputs.dry_run == false)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-wheels
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: release-worker
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/fgg-worker-x86_64-unknown-linux-gnu
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            ## Install (без локальной сборки)

            ```bash
            # Python
            pip install https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/fastapi_grpc_gateway-${{ github.ref_name }}.whl
            # если имя файла с подчёркиваниями:
            # pip install https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/fastapi_grpc_gateway-0.1.0-py3-none-any.whl
            pip install granian

            # Worker
            curl -sL -o fgg-worker \
              https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/fgg-worker-x86_64-unknown-linux-gnu
            chmod +x fgg-worker
            ```

            После настройки PyPI Trusted Publishing: `pip install fastapi-grpc-gateway==0.1.0` (без префикса `v`).

  pypi-publish:
    name: Publish to PyPI
    needs: build-python
    if: startsWith(github.ref, 'refs/tags/v') && (github.event_name != 'workflow_dispatch' || inputs.dry_run == false)
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/fastapi-grpc-gateway
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-wheels
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
        continue-on-error: true
