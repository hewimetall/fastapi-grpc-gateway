name: Release

# Тег v0.2.0 → GitHub Release (whl) + PyPI
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build only (skip PyPI / GitHub Release publish)"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build-python:
    name: Build Python wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Build
        run: uv build --out-dir dist

      - name: Check
        run: uvx twine check dist/*

      - name: Verify tag version matches package (on tags)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "tag=$TAG package=$PKG"
          test "$TAG" = "$PKG"

      - uses: actions/upload-artifact@v4
        with:
          name: release-wheels
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error

  github-release:
    name: GitHub Release
    needs: [build-python]
    if: startsWith(github.ref, 'refs/tags/v') && (github.event_name != 'workflow_dispatch' || inputs.dry_run == false)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-wheels
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            ## Install (uv)

            ```bash
            uv add 'fastapi-grpc-gateway @ https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/fastapi_grpc_gateway-0.2.0-py3-none-any.whl'
            # подставьте точное имя .whl из assets релиза
            uv run fgg serve --app app:app --http-port 8000 --grpc-bind 127.0.0.1:50051 --out ./gen
            ```

            pip: `pip install <url-to-whl>`

            После PyPI Trusted Publishing: `uv add fastapi-grpc-gateway`.

  pypi-publish:
    name: Publish to PyPI
    needs: build-python
    if: startsWith(github.ref, 'refs/tags/v') && (github.event_name != 'workflow_dispatch' || inputs.dry_run == false)
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/fastapi-grpc-gateway
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-wheels
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
        continue-on-error: true
