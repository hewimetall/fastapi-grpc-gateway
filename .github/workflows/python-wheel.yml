name: Build Python wheel

on:
  push:
    branches: [main, "cursor/**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wheel:
    name: Build whl
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Build wheel and sdist
        run: uv build --out-dir dist

      - name: Check package metadata
        run: |
          uvx twine check dist/*

      - name: Show artifacts
        run: ls -la dist/

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-wheels
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error
          retention-days: 14

  smoke-install:
    name: Smoke install wheel
    needs: build-wheel
    runs-on: ubuntu-latest
    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          name: python-wheels
          path: dist

      - name: Install wheel and smoke check
        run: |
          WHL=$(ls dist/*.whl | head -1)
          uv venv
          uv pip install "$WHL"
          uv run python -c "from fastapi_grpc_gateway import generate_schema, iter_json_routes; print('ok')"
          uv run fgg --help

  test-coverage:
    name: Pytest coverage ≥93%
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync and test
        run: |
          uv sync --extra dev --frozen
          uv run pytest
