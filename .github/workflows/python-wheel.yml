name: Build Python wheel

on:
  push:
    branches: [main, "cursor/**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wheel:
    name: Build whl
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build wheel and sdist
        run: python -m build --outdir dist

      - name: Check package metadata
        run: twine check dist/*

      - name: Show artifacts
        run: ls -la dist/

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-wheels
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error
          retention-days: 14

  # Optional smoke: install the built wheel and import the package
  smoke-install:
    name: Smoke install wheel
    needs: build-wheel
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          name: python-wheels
          path: dist

      - name: Install wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl

      - name: Import and CLI check
        run: |
          python -c "from fastapi_grpc_gateway import generate_schema, iter_json_routes; print('ok')"
          fgg --help

  test-coverage:
    name: Pytest coverage ≥93%
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Test with coverage gate
        run: pytest
