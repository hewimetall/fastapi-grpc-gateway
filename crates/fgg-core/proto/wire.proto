syntax = "proto3";
package fgg.wire;

// Shared wire types (Python serve + Rust fgg-core).
message RpcRequest {
  map<string, string> path = 1;
  map<string, string> query = 2;
  bytes body = 3;
}

message JsonResponse {
  int32 status_code = 1;
  bytes body = 2;
  map<string, string> headers = 3;
}
