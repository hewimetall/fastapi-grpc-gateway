[project]
name = "fastapi-grpc-gateway"
version = "0.1.0"
description = "Minimal Python schema gen for Rust gRPC→HTTP worker over Granian/FastAPI"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24.0",
    "httpx>=0.27.0",
    "granian>=1.6.0",
    "grpcio>=1.68.0",
    "grpcio-tools>=1.68.0",
]

[project.scripts]
fgg = "fastapi_grpc_gateway.cli:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["fastapi_grpc_gateway*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
