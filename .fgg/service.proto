syntax = "proto3";
package fastapi_grpc;

option go_package = "./fastapi_grpc;fastapi_grpc";

// Generated by fastapi-grpc-gateway.
// fgg serve converts each RPC to an in-process ASGI call on FastAPI.

message RpcRequest {
  map<string, string> path = 1;
  map<string, string> query = 2;
  bytes body = 3;
}

message JsonResponse {
  int32 status_code = 1;
  bytes body = 2;
  map<string, string> headers = 3;
}

service API {
}
